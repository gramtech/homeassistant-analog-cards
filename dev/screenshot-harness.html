<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>screenshot harness</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
  }
  body.theme-light {
    background: #fafafa;
    --primary-text-color: #212121;
    --secondary-text-color: #727272;
    --error-color: #db4437;
  }
  body.theme-dark {
    background: #111111;
    --primary-text-color: #e1e1e1;
    --secondary-text-color: #9b9b9b;
    --error-color: #ff6961;
  }
  #stage { width: 260px; }
</style>
</head>
<body>
<div id="stage"></div>
<script type="module">
  class MockHaCard extends HTMLElement {
    connectedCallback() {
      const dark = document.body.classList.contains('theme-dark');
      Object.assign(this.style, {
        display: 'block',
        borderRadius: '12px',
        boxShadow: dark ? '0 2px 6px rgba(0,0,0,0.6)' : '0 2px 6px rgba(0,0,0,0.25)',
        background: dark ? '#1c1c1c' : '#ffffff',
        overflow: 'hidden',
      });
    }
  }
  customElements.define('ha-card', MockHaCard);
  class MockHaForm extends HTMLElement {}
  customElements.define('ha-form', MockHaForm);

  await import('../dist/analog-cards.js');

  const params = new URLSearchParams(location.search);
  const tag = params.get('tag');
  const style = params.get('style') || 'classic';
  const theme = params.get('theme') || 'light';
  document.body.classList.add(`theme-${theme}`);

  const ENTITY_BY_TAG = {
    'analog-barometer-card': {
      entity_id: 'sensor.pressure',
      state: '1013.2',
      attributes: { friendly_name: 'Outdoor Pressure', unit_of_measurement: 'hPa', device_class: 'atmospheric_pressure' },
    },
    'analog-thermometer-radial-card': {
      entity_id: 'sensor.temp',
      state: '22.5',
      attributes: { friendly_name: 'Living Room', unit_of_measurement: '°C', device_class: 'temperature' },
    },
    'analog-thermometer-mercury-card': {
      entity_id: 'sensor.temp',
      state: '22.5',
      attributes: { friendly_name: 'Outside', unit_of_measurement: '°C', device_class: 'temperature' },
    },
    'analog-humidity-radial-card': {
      entity_id: 'sensor.humidity',
      state: '55',
      attributes: { friendly_name: 'Basement', unit_of_measurement: '%', device_class: 'humidity' },
    },
  };

  const entityDef = ENTITY_BY_TAG[tag];

  function makeHass() {
    if (!entityDef) return { language: 'en', states: {}, callApi: async () => [[]] };
    return {
      language: 'en',
      states: {
        [entityDef.entity_id]: {
          entity_id: entityDef.entity_id,
          state: entityDef.state,
          last_changed: new Date().toISOString(),
          last_updated: new Date().toISOString(),
          attributes: entityDef.attributes,
        },
      },
      callApi: async () => [
        [{ state: String(parseFloat(entityDef.state) - 2), last_updated: new Date(Date.now() - 3 * 3600 * 1000).toISOString() }],
      ],
    };
  }

  const card = document.createElement(tag);
  const config = { type: `custom:${tag}`, face_style: style };
  if (entityDef) config.entity = entityDef.entity_id;
  card.setConfig(config);
  if (entityDef) card.hass = makeHass();
  document.getElementById('stage').appendChild(card);

  window.__ready = true;
</script>
</body>
</html>
